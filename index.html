<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaVerse - Votre guide manga</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== HEADER ===== */
        header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 2rem;
        }

        .logo h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(90deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo span {
            font-size: 0.9rem;
            color: #aaa;
            font-weight: 300;
        }

        .author-badge {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #1a1a2e;
            padding: 8px 18px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 0.9rem;
            box-shadow: 0 0 20px rgba(247, 151, 30, 0.3);
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(247, 151, 30, 0.3); }
            50% { box-shadow: 0 0 35px rgba(247, 151, 30, 0.6); }
        }

        /* ===== MAIN CONTENT ===== */
        main {
            flex: 1;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* ===== HERO SECTION ===== */
        .hero {
            text-align: center;
            padding: 50px 20px 40px;
        }

        .hero h2 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 1.1rem;
            color: #ccc;
            max-width: 700px;
            margin: 0 auto 30px;
            line-height: 1.7;
        }

        /* ===== STATS ===== */
        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #999;
            margin-top: 5px;
        }

        /* ===== SEARCH BAR ===== */
        .search-container {
            max-width: 700px;
            margin: 0 auto 40px;
            position: relative;
        }

        .search-bar {
            display: flex;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .search-bar:focus-within {
            border-color: #f7971e;
            box-shadow: 0 0 30px rgba(247, 151, 30, 0.2);
            background: rgba(255, 255, 255, 0.12);
        }

        .search-bar input {
            flex: 1;
            padding: 18px 25px;
            border: none;
            background: transparent;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }

        .search-bar input::placeholder {
            color: #777;
        }

        .search-bar button {
            padding: 18px 30px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            border: none;
            color: #1a1a2e;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-bar button:hover {
            background: linear-gradient(135deg, #ffd200, #f7971e);
        }

        /* Suggestions dropdown */
        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: rgba(30, 30, 60, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            margin-top: 5px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
            z-index: 100;
        }

        .suggestions.active {
            display: block;
        }

        .suggestion-item {
            padding: 15px 20px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.2s;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-item:hover {
            background: rgba(247, 151, 30, 0.15);
        }

        .suggestion-item .q {
            color: #f7971e;
            font-weight: 600;
        }

        .suggestion-item .preview {
            color: #999;
            font-size: 0.85rem;
            margin-top: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ===== CATEGORIES ===== */
        .categories {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .category-btn {
            padding: 10px 22px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: #ccc;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .category-btn:hover, .category-btn.active {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #1a1a2e;
            border-color: transparent;
            box-shadow: 0 0 20px rgba(247, 151, 30, 0.3);
        }

        /* ===== RESULT AREA ===== */
        .result-area {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            min-height: 200px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 30px;
        }

        .result-area .placeholder {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .result-area .placeholder .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .result-area .placeholder h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: #888;
        }

        .result-area .question {
            font-size: 1.1rem;
            color: #f7971e;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .result-area .question strong {
            color: #ffd200;
        }

        .result-area .answer {
            font-size: 1rem;
            line-height: 1.8;
            color: #ddd;
        }

        .result-area .answer p {
            margin-bottom: 12px;
        }

        .result-area .answer .highlight {
            color: #f7971e;
            font-weight: 600;
        }

        .result-area .answer ul {
            margin: 10px 0 10px 20px;
        }

        .result-area .answer li {
            margin-bottom: 6px;
